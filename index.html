<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | My project</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">My project</div>
      </div>
    </div>
    <script>

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";
      var config = {
        dataUrl: buildUrl + "/WebGL.data.unityweb",
        frameworkUrl: buildUrl + "/WebGL.framework.js.unityweb",
        codeUrl: buildUrl + "/WebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "My project",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:

        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                loadingBar.style.display = "none";
                fullscreenButton.onclick = () => {
                  unityInstance.SetFullscreen(1);
                };
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>

    <style>
      #like-widget{width:100%;padding:20px 0 30px;display:flex;flex-direction:column;align-items:center;gap:9px;font-family:Arial,sans-serif;background:#fff;box-sizing:border-box;}
      #like-button{width:92px;height:92px;padding:0;border:0;background:transparent;cursor:pointer;display:grid;place-items:center;}
      #like-button:focus-visible{outline:3px solid #ff9da0;outline-offset:4px;border-radius:50%;}
      #like-icon{display:block;width:82px;height:82px;overflow:visible;}
      #like-icon .ring{fill:#fff;stroke:#585858;stroke-width:4;}
      #like-icon .outline{fill:none;stroke:#585858;stroke-width:5;stroke-linejoin:round;stroke-linecap:round;transition:opacity .16s ease;}
      #like-icon .filled{fill:#ff5154;opacity:0;transform-origin:50px 51px;transform:scale(.74);transition:opacity .14s ease,transform .32s cubic-bezier(.2,1.55,.45,1);}
      #like-button.is-liked .outline{opacity:0;}
      #like-button.is-liked .filled{opacity:1;transform:scale(1);}
      #like-button.playing #like-icon{animation:like-pop .52s cubic-bezier(.2,1.35,.35,1);}
      @keyframes like-pop{0%{transform:scale(1)}45%{transform:scale(1.17)}100%{transform:scale(1)}}
      #like-count{font-size:25px;line-height:1;color:#ff5154;font-variant-numeric:tabular-nums;}
    </style>
    <div id="like-widget" aria-label="Like this cooking game">
      <button id="like-button" type="button" aria-label="Like">
        <svg id="like-icon" viewBox="0 0 100 100" aria-hidden="true">
          <circle class="ring" cx="50" cy="50" r="45"></circle>
          <g class="outline"><path d="M25 49v29h12V49H25z"></path><path d="M39 49l18-22c4-5 12-1 10 6l-6 16h17c8 0 11 8 6 14l-2 3c1 8-4 12-10 12H39V49z"></path></g>
          <g class="filled"><path d="M25 49v29h12V49H25z"></path><path d="M39 49l18-22c4-5 12-1 10 6l-6 16h17c8 0 11 8 6 14l-2 3c1 8-4 12-10 12H39V49z"></path></g>
        </svg>
      </button>
      <span id="like-count">12</span>
    </div>
    <script>
      (function(){var initialCount=12,key='cookieGameLikeCountV1',button=document.getElementById('like-button'),countLabel=document.getElementById('like-count'),animation=document.getElementById('like-animation'),stored=null;try{stored=localStorage.getItem(key);}catch(e){}var count=Number(stored);if(!Number.isFinite(count)||count<initialCount)count=initialCount;function showCount(){countLabel.textContent=count;}function play(){var svg=animation.contentDocument&&animation.contentDocument.getElementById('likeSvg');if(svg)svg.dispatchEvent(new MouseEvent('click',{bubbles:true}));}showCount();button.addEventListener('click',function(){count+=1;try{localStorage.setItem(key,String(count));}catch(e){}showCount();play();});})();
    </script>
    <script>
      (function(){var original=document.getElementById('like-button'),button=original.cloneNode(true),countLabel=document.getElementById('like-count'),initialCount=12,key='cookieGameLikeCountV2',stored=null;original.parentNode.replaceChild(button,original);try{stored=localStorage.getItem(key);}catch(e){}var count=Number(stored);if(!Number.isFinite(count)||count<initialCount)count=initialCount;var liked=count>initialCount;function show(){countLabel.textContent=count;button.classList.toggle('is-liked',liked);}show();window.cookieGameLikeReady=true;button.addEventListener('click',function(){if(!liked){count+=1;liked=true;try{localStorage.setItem(key,String(count));}catch(e){}show();}button.classList.remove('playing');void button.offsetWidth;button.classList.add('playing');setTimeout(function(){button.classList.remove('playing');},560);});})();
    </script>
  </body>
</html>
